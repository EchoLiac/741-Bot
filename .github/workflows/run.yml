name: TrendSpider Bot Run

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Code aus Repository auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Bibliotheken installieren
      run: |
        pip install requests playwright
        playwright install --with-deps chromium

    - name: Bot ausführen
      env:
        DISCORD_WEBHOOK_TRENDSPIDER: ${{ secrets.DISCORD_WEBHOOK_TRENDSPIDER }}
        DISCORD_WEBHOOK_EARNINGS: ${{ secrets.DISCORD_WEBHOOK_EARNINGS }}
        DISCORD_WEBHOOK_WATCHERGURU: ${{ secrets.DISCORD_WEBHOOK_WATCHERGURU }}
      run: python BOT.PY

    - name: Debug-Dateien hochladen
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-files
        path: |
          debug_screenshot.png
          debug_page.html

    - name: Gesehene Tweet-IDs speichern
      if: success()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add seen_ids_*.json
        git diff --staged --quiet || git commit -m "Update seen tweet IDs"
        git push
