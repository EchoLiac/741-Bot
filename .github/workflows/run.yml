name: run-bot

on:
  schedule:
    - cron: '*/15 * * * *'  # Läuft automatisch alle 15 Minuten
  workflow_dispatch:        # Erlaubt dir das manuelle Starten über den Button

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Code aus Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bibliotheken installieren
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Bot ausführen
        env:
          DISCORD_WEBHOOK_TRENDSPIDER: ${{ secrets.DISCORD_WEBHOOK_TRENDSPIDER }}
          DISCORD_WEBHOOK_EARNINGS: ${{ secrets.DISCORD_WEBHOOK_EARNINGS }}
          DISCORD_WEBHOOK_WATCHERGURU: ${{ secrets.DISCORD_WEBHOOK_WATCHERGURU }}
          DISCORD_WEBHOOK_EWHISPERS: ${{ secrets.DISCORD_WEBHOOK_EWHISPERS }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: python BOT.PY

      - name: Debug-Dateien hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            *.log
            *.png
          if-no-files-found: ignore

      - name: Gesehene Tweet-IDs speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_ids_*.json || true
          git commit -m "Update seen tweet IDs" || true
          git push origin main || true
