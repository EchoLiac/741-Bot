name: TrendSpider Bot Run

on:
  schedule:
    - cron: '*/15 * * * *'  # Läuft alle 15 Minuten automatisch
  workflow_dispatch:        # Ermöglicht es dir, den Bot jederzeit manuell zu starten

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Code aus Repository auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Requests-Bibliothek installieren
      run: pip install requests

    - name: Bot ausführen
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python BOT.PY
