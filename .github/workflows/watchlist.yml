name: Watchlist Sync Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # Hier wird der Cronjob eingestellt (alle 15 Minuten)
  workflow_dispatch:       # Erlaubt das manuelle Starten per Button in GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py google-generativeai
          
      - name: Run Analyst Script
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python chart_analyst.py
        
      - name: Save processed IDs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add seen_ids_watchlist.json
          git diff-index --quiet HEAD || git commit -m "Update seen watchlist IDs"
          git push
